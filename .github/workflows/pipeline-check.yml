name: Pipeline Criteria Check

on:
  push:
    branches: [main]

jobs:
  check-criteria:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify pipeline criteria thresholds in skill-evaluation-auto.md
        run: |
          python3 - <<'PYEOF'
          """
          Verifica que los criterios numericos criticos del pipeline
          no han sido relajados por debajo de los umbrales minimos.

          Umbrales minimos aceptables:
            PF minimo:         >= 1.3
            DD maximo:         <= 7%
            Trades minimos H1: >= 120
            Sharpe OOS minimo: >= 0.5
          """
          import re
          import sys
          from pathlib import Path

          SKILL_FILE = Path("docs/skills/skill-evaluation-auto.md")

          if not SKILL_FILE.exists():
              print(f"[ERROR] {SKILL_FILE} not found")
              sys.exit(1)

          content = SKILL_FILE.read_text(encoding="utf-8", errors="replace")
          errors = []
          warnings = []

          # ── Helper ────────────────────────────────────────────────────
          def first_float(pattern: str, text: str) -> float | None:
              """Returns the first float found matching the pattern."""
              m = re.search(pattern, text)
              if m:
                  try:
                      return float(m.group(1).replace(",", "."))
                  except ValueError:
                      pass
              return None

          # ── Check 1: PF minimo >= 1.3 ─────────────────────────────────
          # Look for lines like "PF < 1.3" (discard threshold) or "PF >= 1.5" (approval)
          # The filter threshold must be >= 1.3
          pf_filter = first_float(r"PF\s*[<>]=?\s*([\d.,]+)", content)
          # Also look for "PF in-sample < X" pattern
          pf_is = first_float(r"PF in-sample\s*<\s*([\d.,]+)", content)
          pf_builder = first_float(r"PF\s*<\s*([\d.,]+)\s*[→\-]\s*no entra", content)

          if pf_builder is not None and pf_builder < 1.3:
              errors.append(
                  f"PF builder filter is {pf_builder} — minimum allowed is 1.3 "
                  f"(relaxed criteria increase overfitting risk)"
              )
          elif pf_is is not None and pf_is < 1.3:
              errors.append(
                  f"PF IS discard threshold is {pf_is} — minimum allowed is 1.3"
              )

          # ── Check 2: DD maximo <= 7% ──────────────────────────────────
          dd_values = re.findall(r"DD\b.*?>\s*([\d.,]+)\s*%", content, re.IGNORECASE)
          for val_str in dd_values:
              try:
                  val = float(val_str.replace(",", "."))
                  if val > 7.0:
                      errors.append(
                          f"DD discard threshold found as {val}% — maximum allowed is 7% "
                          f"(higher DD risk = closer to FTMO limit)"
                      )
              except ValueError:
                  pass

          # ── Check 3: Trades minimos IS >= 120 (approval threshold) ────
          trades_approval = first_float(r"Trades\s+totales\s*>=\s*([\d.,]+)", content)
          trades_discard  = first_float(r"Trades\s+totales\s*<\s*([\d.,]+)", content)

          if trades_approval is not None and trades_approval < 120:
              warnings.append(
                  f"Trades approval threshold is {trades_approval} — "
                  f"recommended minimum is 120 for statistical significance"
              )
          if trades_discard is not None and trades_discard < 80:
              warnings.append(
                  f"Trades discard threshold is {trades_discard} — "
                  f"recommended minimum is 80"
              )

          # ── Check 4: Sharpe OOS minimo >= 0.5 ────────────────────────
          sharpe_val = first_float(r"Sharpe\s+OOS\s*>=?\s*([\d.,]+)", content)
          if sharpe_val is not None and sharpe_val < 0.5:
              warnings.append(
                  f"Sharpe OOS threshold is {sharpe_val} — "
                  f"recommended minimum is 0.5"
              )

          # ── Report ────────────────────────────────────────────────────
          print(f"Pipeline Criteria Check — {SKILL_FILE}")
          print(f"{'='*60}")

          if errors:
              print(f"\nFAILED — {len(errors)} critical violation(s):")
              for e in errors:
                  print(f"  ✗ {e}")

          if warnings:
              print(f"\nWARNINGS — {len(warnings)} advisory notice(s):")
              for w in warnings:
                  print(f"  ⚠ {w}")

          if not errors and not warnings:
              print("All pipeline criteria thresholds are within safe bounds.")

          print()

          if errors:
              sys.exit(1)
          else:
              sys.exit(0)
          PYEOF
